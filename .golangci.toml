# .golangci.toml
[run]
timeout = "5m"
exclude-dirs = [".github"]

[linters]
enable = [
  "gofmt",
  "revive",
  "govet",
  "staticcheck",
  "unused",
  "errcheck",
  "ineffassign",
  "misspell",
]

[linters-settings.gofmt]
simplify = true

[linters-settings.revive]
confidence = 0.8

[linters-settings.staticcheck]
checks = ["all"]

[linters-settings.misspell]
locale = "US"

[issues]
max-issues-per-linter = 50
max-same-issues = 10

[[issues.exclude-rules]]
path = "block_useragents.*\\.go"
linters = ["revive"]
