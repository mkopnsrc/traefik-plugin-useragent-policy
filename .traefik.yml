# .traefik.yml
displayName: User-Agent Policy
type: middleware
import: github.com/mkopnsrc/traefik-plugin-useragent-policy
summary: Applies User-Agent allow/deny policy with optional OS filtering, log-only staging, and bypass paths.
description: |
  A Traefik middleware plugin that gates requests by User-Agent. Supports allow rules, per-rule deny exceptions, optional OS filtering, log-only staging, path bypass, and periodic metrics summaries. Fully customizable with no external dependencies.
testData:
  allowedBrowsers:
    - name: "Chrome"
      regex: "Chrome/13[0-3].*" # Chrome 130-133
    - name: "Firefox"
      regex: "Firefox/13[1-5].*" # Firefox 131-135
    - name: "Edg" # Microsoft Edge
      regex: "Edg/10[0-9]" # Edge 100-109
    - name: "Brave"
      regex: "Brave/1\\.[7][5-9]" # Brave 1.75-1.79 (escape the literal dot)
    - name: "CriOS" # Chrome for iOS
      regex: "CriOS/13[0-9]"
  allowedOSTypes:
    - "Windows NT 10\\.0" # Windows 10
    - "Mac OS X 10\\.[0-9]+" # macOS 10.x
    - "Linux" # Linux
    - "X11" # Unix
    - "Android" # Android
    - "iOS" # iOS